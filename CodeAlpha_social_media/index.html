<!DOCTYPE html>
<html>
<head>
    <title>Project Management Tool</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Project Management Tool</h1>

<div class="container">

    <div class="add-task">
        <input type="text" id="taskInput"
        placeholder="Enter Task">

        <button onclick="addTask()">
            Add Task
        </button>
    </div>

    <div class="board">

        <div class="column">
            <h2>To Do</h2>
            <div id="todo"></div>
        </div>

        <div class="column">
            <h2>In Progress</h2>
            <div id="progress"></div>
        </div>

        <div class="column">
            <h2>Done</h2>
            <div id="done"></div>
        </div>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
